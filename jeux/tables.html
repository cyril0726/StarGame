<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGame - Tables de Multiplication</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="game-title">Tables de Multiplication</h1>
            <a href="../index.html" class="back-button">Retour au portail</a>
        </div>
    </nav>

    <div class="container">
        <main class="game-container">
            <div id="selection-tables" class="selection-section">
                <h2>Quelles tables veux-tu tester ?</h2>
				<div class="tables-buttons">
					<button class="table-button" data-table="1" onclick="JeuTables.selectionnerTable(1)">1</button>
					<button class="table-button" data-table="2" onclick="JeuTables.selectionnerTable(2)">2</button>
					<button class="table-button" data-table="3" onclick="JeuTables.selectionnerTable(3)">3</button>
					<button class="table-button" data-table="4" onclick="JeuTables.selectionnerTable(4)">4</button>
					<button class="table-button" data-table="5" onclick="JeuTables.selectionnerTable(5)">5</button>
					<button class="table-button" data-table="6" onclick="JeuTables.selectionnerTable(6)">6</button>
					<button class="table-button" data-table="7" onclick="JeuTables.selectionnerTable(7)">7</button>
					<button class="table-button" data-table="8" onclick="JeuTables.selectionnerTable(8)">8</button>
					<button class="table-button" data-table="9" onclick="JeuTables.selectionnerTable(9)">9</button>
				</div>
				<div class="mode-selection">
					<button id="start-game" class="start-button" onclick="JeuTables.commencerJeu()">Commencer</button>
					<button id="start-chrono" class="chrono-button" onclick="JeuTables.basculerModeChrono()">Mode Chrono</button>
				</div>
            </div>

            <div id="game-section" class="game-section" style="display: none;">
                <div id="time-display" class="time-display" style="display: none;">
                    Temps restant : <span id="time-left">60</span> secondes
                </div>
                <div class="question-display">
                    <p id="question">?</p>
                </div>
                <div class="answer-section">
                    <input type="number" id="answer" autofocus inputmode="numeric">
                    <button id="validate-answer" onclick="JeuTables.verifierReponse()">Valider</button>
                </div>
                <div class="feedback">
                    <p id="feedback-message"></p>
                    <div class="feedback-display">
                        <p id="score-display">Score : <span id="score">0</span></p>
                        <p id="error-display">Erreurs : <span id="errors">0</span>/5</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>© 2026 StarGame - Un jeu par Cyril0726</p>
    </footer>

    <script src="../js/tables.js"></script>
</body>
</html>
