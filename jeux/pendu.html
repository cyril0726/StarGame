<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGame - Pendu</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pendu.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="game-title">Pendu</h1>
            <a href="../index.html" class="back-button">← Retour au portail</a>
        </header>

        <main class="game-container">
            <div class="game-info">
                <div id="mot" class="word-display"></div>
                <div id="erreurs" class="errors">Erreurs : 0/6</div>
            </div>

            <div class="hangman-container">
                <div class="hangman-drawing">
                    <pre id="hangman-art">
  ______
  |    |
  |
  |
  |
  |
__|__
                    </pre>
                </div>
            </div>

            <div class="input-section">
                <input type="text" id="lettre" class="letter-input" maxlength="1" placeholder="Devine une lettre" autofocus>
                <button onclick="devinerLettre()" class="guess-button">Valider</button>
            </div>
        </main>

        <footer>
            <p>© 2026 StarGame - Un jeu par Cyril Gourdon</p>
        </footer>
    </div>

    <script src="../js/pendu.js"></script>
</body>
</html>
