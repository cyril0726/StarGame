<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarGame - Pendu</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pendu.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="game-title">Pendu</h1>
            <a href="../index.html" class="back-button">Retour au portail</a>
        </div>
    </nav>

    <div class="container">
        <main class="game-container">
            <div class="game-info">
                <div id="mot"></div>
                <div id="erreurs">Erreurs : 0/6</div>
            </div>

            <div class="hangman-container">
                <pre id="hangman-art">
  +---+
  |   |
      |
      |
      |
      |
=========
                </pre>
            </div>

            <div class="input-section">
                <input type="text" id="lettre" maxlength="1" placeholder="Devine une lettre" autofocus>
                <button onclick="devinerLettre()">Valider</button>
            </div>
        </main>
    </div>

    <footer>
        <p>© 2026 StarGame - Un jeu par Cyril Gourdon</p>
    </footer>

    <script src="../js/pendu.js"></script>
</body>
</html>
